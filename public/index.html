<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIU Cover Page Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00994d;
            --primary-hover: #007a3d;
            --secondary: #1e293b;
            --bg-gradient-1: #f8fafc;
            --bg-gradient-2: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: #cbd5e1;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h2 {
            color: var(--secondary);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .form-section {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
        }

        .section-icon {
            background: #f0fdf4;
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--secondary);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: var(--secondary);
            transition: all 0.3s ease;
        }

        input:hover {
            background: #f1f5f9;
        }

        input:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 153, 77, 0.1);
        }

        input:focus+label {
            color: var(--primary);
        }

        .helper-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }

        button.submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--primary);
        }

        button.submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .input-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }
        }

        /* Loader Styles */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .loader-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .loader-icon {
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .loader-content h3 {
            color: var(--secondary);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .loader-content p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .animate-spin {
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <script>
        // --- Loader & AJAX Logic ---
        const pdfForm = document.getElementById('pdfForm');
        const loaderOverlay = document.getElementById('loaderOverlay');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const loaderStatus = document.getElementById('loaderStatus');
        const submitBtn = document.getElementById('submitBtn');

        pdfForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Disable button and show loader
            submitBtn.disabled = true;
            loaderOverlay.style.display = 'flex';

            const formData = new FormData(pdfForm);
            const data = Object.fromEntries(formData.entries());

            let progress = 0;
            const updateProgress = (target, speed = 50) => {
                return setInterval(() => {
                    if (progress < target) {
                        progress += 1;
                        progressBar.style.width = `${progress}%`;
                        progressText.innerText = `${progress}%`;

                        if (progress < 30) loaderStatus.innerText = "Initializing engine...";
                        else if (progress < 60) loaderStatus.innerText = "Rendering document...";
                        else if (progress < 90) loaderStatus.innerText = "Finalizing PDF...";
                    }
                }, speed);
            };

            // Start simulated progress
            let progressInterval = updateProgress(95, 100);

            try {
                const response = await fetch('/generate-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to generate PDF');
                }

                // Finish progress
                clearInterval(progressInterval);
                progress = 100;
                progressBar.style.width = '100%';
                progressText.innerText = '100%';
                loaderStatus.innerText = "PDF Ready! Starting download...";

                // Get the blob and trigger download
                const blob = await response.blob();
                if (blob.size === 0) throw new Error("Generated PDF is empty");

                const url = window.URL.createObjectURL(blob);

                // Try to get filename from header
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = 'Cover_Page.pdf';
                if (contentDisposition && contentDisposition.includes('filename=')) {
                    filename = contentDisposition.split('filename=')[1].replace(/"/g, '');
                }

                // Create download link
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);

                // Trigger download
                a.click();

                // For some mobile browsers, we show a success message or a manual link
                loaderStatus.innerHTML = `Document ready. <a href="${url}" download="${filename}" style="color: var(--primary); text-decoration: underline;">Click here</a> if download didn't start.`;

                // Cleanup
                setTimeout(() => {
                    if (document.body.contains(a)) {
                        a.remove();
                    }
                    // We keep the URL for the manual link for a bit
                }, 10000);

                setTimeout(() => {
                    loaderOverlay.style.display = 'none';
                    submitBtn.disabled = false;
                    window.URL.revokeObjectURL(url);
                }, 15000); // Give user time to click if auto-download failed

            } catch (err) {
                clearInterval(progressInterval);
                loaderOverlay.style.display = 'none';
                submitBtn.disabled = false;
                alert('Error: ' + err.message);
                console.error(err);
            }
        });


        // --- Existing Auto-fill Logic ---

        // Set today's date formatted as DD-MM-YYYY
        const dateInput = document.getElementById('dateInput');
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0'); //January is 0!
        const yyyy = today.getFullYear();
        dateInput.value = dd + '-' + mm + '-' + yyyy;

        // Official MIU B.Pharm Course List with Exact Codes
        const courses = {
